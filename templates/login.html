<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Controle de Tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root,[data-theme="dark"]{--bg:#0f1117;--bg-card:#1e2130;--border:#2e3250;--text:#e8eaf6;--sub:#8b90b8;--muted:#555a7a;--accent:#7c6af7;--accent-h:#9580ff;--glow:rgba(124,106,247,0.22);}
        [data-theme="light"]{--bg:#f0f2fa;--bg-card:#fff;--border:#dde1f5;--text:#1a1d2e;--sub:#5a5f85;--muted:#9499bb;--accent:#6355e8;--accent-h:#7c6af7;--glow:rgba(99,85,232,0.12);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s;}
        .wrap{width:100%;max-width:420px;padding:24px;}
        .logo{text-align:center;margin-bottom:32px;}
        .logo-icon{width:56px;height:56px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 24px var(--glow);}
        .logo-icon i{font-size:1.6rem;color:#fff;}
        .logo h1{font-family:'Inter',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
        .logo p{color:var(--sub);font-size:0.875rem;margin-top:4px;}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
        .field{margin-bottom:18px;}
        label{display:block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:6px;}
        .input-wrap{position:relative;}
        .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;}
        input[type=text],input[type=password]{width:100%;padding:11px 13px 11px 38px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.875rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s,box-shadow .2s;}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
        input::placeholder{color:var(--muted);}
        .btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:.9rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;margin-top:6px;}
        .btn:hover{background:var(--accent-h);box-shadow:0 6px 20px var(--glow);transform:translateY(-1px);}
        .footer-links{display:flex;justify-content:center;gap:20px;margin-top:20px;font-size:.8rem;}
        .footer-links a{color:var(--sub);text-decoration:none;transition:color .2s;}
        .footer-links a:hover{color:var(--accent);}
        .flash{padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--text);}
        .theme-btn{position:fixed;top:16px;left:16px;background:var(--bg-card);border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:.9rem;transition:all .2s;z-index:10;}
        .theme-btn:hover{border-color:var(--accent);color:var(--accent);}
    </style>
</head>
<body>
    <button class="theme-btn" id="themeToggle" title="Alternar tema">
        <i class="bi bi-sun-fill" id="themeIcon"></i>
    </button>

    <div class="wrap">
        <div class="logo">
            <div class="logo-icon"><i class="bi bi-check2-square"></i></div>
            <h1>Controle de Tarefas</h1>
            <p>Gerencie suas tarefas com facilidade</p>
        </div>

        <div class="card">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
            <div class="flash">{{ message }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
                <div class="field">
                    <label>Usuário</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text" name="username" placeholder="Seu usuário" required autocomplete="off">
                    </div>
                </div>
                <div class="field">
                    <label>Senha</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="password" placeholder="Sua senha" autocomplete="off">
                    </div>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>

            <div class="footer-links">
                <a href="{{ url_for('register') }}"><i class="bi bi-person-plus"></i> Criar conta</a>
            </div>
        </div>
    </div>

    <script>
    (function(){
        var html=document.documentElement,btn=document.getElementById('themeToggle'),icon=document.getElementById('themeIcon');
        var saved=localStorage.getItem('ct-theme')||'dark';
        apply(saved);
        btn.addEventListener('click',function(){var n=html.getAttribute('data-theme')==='dark'?'light':'dark';apply(n);localStorage.setItem('ct-theme',n);});
        function apply(t){html.setAttribute('data-theme',t);icon.className=t==='dark'?'bi bi-sun-fill':'bi bi-moon-fill';}
    })();
    </script>
</body>
</html>
